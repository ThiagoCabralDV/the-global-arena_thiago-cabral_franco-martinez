{% extends 'base.html' %}
{% load static %}

{% block title %}Editar Torneo - Panel Admin{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="text-white fw-bold">
                    <i class="fa-solid fa-pen me-2 brand-accent"></i> Editar Torneo
                </h4>
                <a href="{% url 'admin_torneos' %}" class="btn btn-outline-light btn-sm">
                    <i class="fa-solid fa-arrow-left me-1"></i> Volver
                </a>
            </div>

            <div class="p-4 rounded-3" style="background: #1a1a2e; border: 1px solid #2d2d4e;">
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="text-white small mb-1">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-purple-custom w-100 fw-bold">
                        <i class="fa-solid fa-floppy-disk me-2"></i> Guardar cambios
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
